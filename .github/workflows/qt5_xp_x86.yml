name: Windows XP Qt5 Build (OpenSSL 1.1.1 - Windows XP Compatible - x86)

on:
  workflow_dispatch:

env:
  B_BUILD_TYPE: Release

jobs:
  win-build:
    name: Windows Qt5 (x86 XP)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install v141_xp toolset
        shell: powershell
        run: |
          $installer = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
          $args = 'modify --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" --add Microsoft.VisualStudio.Component.WinXP --quiet --norestart'
          Start-Process -FilePath $installer -ArgumentList $args -Wait

      - name: Install OpenSSL 1.1.1 (32-bit)
        shell: powershell
        run: |
          choco install openssl --version=1.1.1.2100 -y --forcex86

      - name: Build dnssd x86 from source (marcschier/dnssd)
        shell: cmd
        run: |
          set ROOT=%CD%
          set DNSSD=%ROOT%\deps\dnssd-src
          set TARGET=%ROOT%\deps\lib_target
          set GUI_SRC=%ROOT%\src\gui\src

          git clone --depth 1 https://github.com/marcschier/dnssd.git "%DNSSD%"
          if errorlevel 1 exit /b 1

          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"

          cd "%DNSSD%"
          cmake -S . -B build_x86 -G "Visual Studio 17 2022" -A Win32 -T v141_xp
          cmake --build build_x86 --config Release
          if errorlevel 1 exit /b 1

          cd "%ROOT%"
          md "%TARGET%" 2>nul

          copy /Y "%DNSSD%\build_x86\bin\Release\dnssd.dll" "%TARGET%\"
          if errorlevel 1 ( echo ERRO: dnssd.dll nao encontrada & exit /b 1 )

          copy /Y "%DNSSD%\build_x86\lib\Release\dnssd.lib" "%TARGET%\"
          if errorlevel 1 ( echo ERRO: dnssd.lib nao encontrada & exit /b 1 )

          powershell -Command "Invoke-WebRequest 'https://raw.githubusercontent.com/apple-oss-distributions/mDNSResponder/main/mDNSShared/dns_sd.h' -OutFile '%GUI_SRC%\dns_sd.h'"
          if errorlevel 1 ( echo ERRO: falha ao baixar dns_sd.h & exit /b 1 )

          echo === Artefatos gerados ===
          dir "%TARGET%"

      - name: Patch VersionHelpers for XP compatibility
        shell: powershell
        run: |
          $file = "src\lib\inputleap\win32\AppUtilWindows.cpp"
          $content = Get-Content $file -Raw
          $patch = "// VersionHelpers.h not available on XP SDK - manual implementation`n#include <windows.h>`nstatic inline bool IsWindowsVistaOrGreater() {`n    OSVERSIONINFO osvi = { sizeof(OSVERSIONINFO) };`n    GetVersionEx(&osvi);`n    return osvi.dwMajorVersion >= 6;`n}`nstatic inline bool IsWindowsXPOrGreater() {`n    OSVERSIONINFO osvi = { sizeof(OSVERSIONINFO) };`n    GetVersionEx(&osvi);`n    return (osvi.dwMajorVersion > 5) || (osvi.dwMajorVersion == 5 && osvi.dwMinorVersion >= 1);`n}"
          $content = $content -replace '#include <VersionHelpers\.h>', $patch
          Set-Content $file $content
          Write-Host "Patch aplicado com sucesso em $file"

      - name: Install Qt5
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          arch: win32_msvc2019
          cache: true

      - name: Configure build
        shell: powershell
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          New-Item -Force -ItemType Directory -Path build | Out-Null

          $ssl_root = "C:\Program Files (x86)\OpenSSL-Win32"
          $lib_path = (Resolve-Path ".\deps\lib_target\dnssd.lib").Path.Replace('\', '/')

          cd build
          cmake -S .. `
            -G "Visual Studio 17 2022" `
            -A Win32 `
            -T v141_xp `
            -D CMAKE_BUILD_TYPE=Release `
            -D QT_DEFAULT_MAJOR_VERSION=5 `
            -D INPUTLEAP_VERSION_DESC=release `
            -D INPUTLEAP_BUILD_GUI=ON `
            -D INPUTLEAP_BUILD_TESTS=OFF `
            -D INPUTLEAP_BUILD_GULRAK_FILESYSTEM=1 `
            -D DNSSD_LIB="$lib_path" `
            -D OPENSSL_ROOT_DIR="$ssl_root" `
            -D CMAKE_INSTALL_PREFIX=input-leap-install

      - name: Build
        shell: powershell
        run: |
          cmake --build build --config Release --target install

      - name: Copy Runtime Dependencies
        shell: powershell
        run: |
          $openssl_bin = "C:\Program Files (x86)\OpenSSL-Win32\bin"
          Copy-Item "$openssl_bin\libssl-1_1.dll"   -Destination "build\input-leap-install" -Force
          Copy-Item "$openssl_bin\libcrypto-1_1.dll" -Destination "build\input-leap-install" -Force
          Copy-Item ".\deps\lib_target\dnssd.dll"    -Destination "build\input-leap-install" -Force

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path build\input-leap-install\* `
            -DestinationPath input-leap-windows-xp-qt5-openssl111-x86.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: input-leap-windows-xp-qt5-openssl111-x86
          path: input-leap-windows-xp-qt5-openssl111-x86.zip
          retention-days: 30
