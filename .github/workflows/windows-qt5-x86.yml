name: Windows Qt5 Build (OpenSSL 1.1.1 - Windows 7/8 Compatible - x86)

on:
  workflow_dispatch:

env:
  B_BUILD_TYPE: Release

jobs:
  win-build:
    name: Windows Qt5 (x86)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          path: input-leap
          submodules: recursive

      # CHAVE DE CACHE: Evita baixar tudo de novo se o build quebrar na frente
      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: .\deps
          key: ${{ runner.os }}-deps-v1

      - name: Download Bonjour SDK-like
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Force -ItemType Directory -Path .\deps
          Invoke-WebRequest 'https://github.com/nelsonjchen/mDNSResponder/releases/download/v2019.05.08.1/x64_RelWithDebInfo.zip' -OutFile 'deps\BonjourSDKLike.zip'
          Expand-Archive .\deps\BonjourSDKLike.zip -DestinationPath .\deps\BonjourSDKLike
          Remove-Item deps\BonjourSDKLike.zip

      - name: Download OpenSSL 1.1.1 (Windows 7/8 Compatible)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Force -ItemType Directory -Path .\deps
          Invoke-WebRequest 'https://download.firedaemon.com/FireDaemon-OpenSSL/openssl-1.1.1w.zip' -OutFile 'deps\Win32OpenSSL.zip'
          Expand-Archive .\deps\Win32OpenSSL.zip -DestinationPath .\deps\Win32OpenSSL
          Remove-Item deps\Win32OpenSSL.zip

      - name: Install Qt5
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          arch: win32_msvc2019
          cache: true

      - name: Configure build
        shell: powershell
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          New-Item -Force -ItemType Directory -Path build | Out-Null
          cd build
          
          # Estrutura exata de 32 bits mapeada do zip fornecido
          $openssl_base_path = "$env:GITHUB_WORKSPACE\deps\Win32OpenSSL"
          $ssl_base = "$openssl_base_path\openssl-1.1"
          $ssl_root = "$ssl_base\x86"
          $ssl_include = "$ssl_base\include"
          
          cmake -S ..\input-leap `
            -G "Visual Studio 17 2022" `
            -A Win32 `
            -D CMAKE_BUILD_TYPE=Release `
            -D QT_DEFAULT_MAJOR_VERSION=5 `
            -D INPUTLEAP_VERSION_DESC=release `
            -D INPUTLEAP_BUILD_GULRAK_FILESYSTEM=1 `
            -D DNSSD_LIB="$env:GITHUB_WORKSPACE\deps\BonjourSDKLike\Lib\Win32\dnssd.lib" `
            -D OPENSSL_USE_STATIC_LIBS=OFF `
            -D OPENSSL_ROOT_DIR="$ssl_root" `
            -D OPENSSL_INCLUDE_DIR="$ssl_include" `
            -D OPENSSL_CRYPTO_LIBRARY="$ssl_root\lib\libcrypto.lib" `
            -D OPENSSL_SSL_LIBRARY="$ssl_root\lib\libssl.lib" `
            -D OPENSSL_LIBRARIES="$ssl_root\lib\libssl.lib;$ssl_root\lib\libcrypto.lib" `
            -D OPENSSL_VERSION="1.1.1w" `
            -D CMAKE_INSTALL_PREFIX=input-leap-install

      - name: Build
        shell: powershell
        run: |
          cmake --build build --config Release --target install

      - name: Copy OpenSSL DLLs
        shell: powershell
        run: |
          # Copia as DLLs de 32 bits corretas para o diretório final do binário
          $openssl_x86_bin = "$env:GITHUB_WORKSPACE\deps\Win32OpenSSL\openssl-1.1\x86\bin"
          Copy-Item "$openssl_x86_bin\libssl-1_1.dll" -Destination "build\input-leap-install" -Force
          Copy-Item "$openssl_x86_bin\libcrypto-1_1.dll" -Destination "build\input
