name: Windows Qt5 Build (OpenSSL 1.1.1 - Windows 7/8 Compatible - x86)

on:
  workflow_dispatch:

env:
  B_BUILD_TYPE: Release

jobs:
 win-build:
    name: Windows Qt5 (x86)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Bonjour
        id: cache-bonjour
        uses: actions/cache@v4
        with:
          path: .\deps
          key: ${{ runner.os }}-bonjour-v1

      - name: Download Bonjour SDK-like
        if: steps.cache-bonjour.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Force -ItemType Directory -Path .\deps
          Invoke-WebRequest 'https://github.com/nelsonjchen/mDNSResponder/releases/download/v2019.05.08.1/x64_RelWithDebInfo.zip' -OutFile 'deps\BonjourSDKLike.zip'
          Expand-Archive .\deps\BonjourSDKLike.zip -DestinationPath .\deps\BonjourSDKLike
          Remove-Item deps\BonjourSDKLike.zip

      - name: Install OpenSSL 1.1.1 (32-bit)
        shell: powershell
        run: |
          choco install openssl --version=1.1.1.2100 -y --forcex86

      # INJEÇÃO LOCAL DOS ARQUIVOS DO BONJOUR (Para evitar erros de caminhos do CMake)
      - name: Inject Bonjour Files Locally
        shell: powershell
        run: |
          $gui_src_dir = ".\src\gui\src"
          
          # 1. Localiza e injeta o cabeçalho dns_sd.h
          $hf = Get-ChildItem -Path .\deps\BonjourSDKLike -Filter "dns_sd.h" -Recurse | Select-Object -First 1
          if ($hf) {
              Write-Host "Injetando dns_sd.h localmente em $gui_src_dir..."
              Copy-Item $hf.FullName -Destination $gui_src_dir -Force
          } else {
              Write-Error "O arquivo dns_sd.h não foi encontrado!"
          }
          
          # 2. Localiza o arquivo .lib de 32 bits (geralmente sob pastas x86 ou Win32)
          # Buscamos especificamente caminhos que NÃO contenham 'x64' ou 'win64' para garantir que é 32-bit
          $lf = Get-ChildItem -Path .\deps\BonjourSDKLike -Filter "dnssd.lib" -Recurse | Where-Object { $_.FullName -notmatch "x64" -and $_.FullName -notmatch "win64" } | Select-Object -First 1
          
          if (-not $lf) {
              # Fallback caso não ache com filtros restritos, pega o primeiro disponível
              $lf = Get-ChildItem -Path .\deps\BonjourSDKLike -Filter "dnssd.lib" -Recurse | Select-Object -First 1
          }
          
          if ($lf) {
              Write-Host "Encontrado dnssd.lib em: $($lf.FullName)"
              New-Item -Force -ItemType Directory -Path .\deps\lib_target | Out-Null
              Copy-Item $lf.FullName -Destination ".\deps\lib_target\dnssd.lib" -Force
              Write-Host "dnssd.lib copiado para .\deps\lib_target\dnssd.lib"
          } else {
              Write-Error "O arquivo dnssd.lib não foi encontrado!"
          }

      - name: Install Qt5
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          arch: win32_msvc2019
          cache: true

      - name: Configure build
        shell: powershell
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          New-Item -Force -ItemType Directory -Path build | Out-Null
          
          $ssl_root = "C:\Program Files (x86)\OpenSSL-Win32"
          # Caminho absoluto simplificado e garantido para a nossa lib injetada
          $lib_path = (Resolve-Path ".\deps\lib_target\dnssd.lib").Path.Replace('\', '/')
          
          cd build
          
          cmake -S .. `
            -G "Visual Studio 17 2022" `
            -A Win32 `
            -D CMAKE_BUILD_TYPE=Release `
            -D QT_DEFAULT_MAJOR_VERSION=5 `
            -D INPUTLEAP_VERSION_DESC=release `
            -D INPUTLEAP_BUILD_GUI=ON `
            -D INPUTLEAP_BUILD_TESTS=OFF `
            -D INPUTLEAP_BUILD_GULRAK_FILESYSTEM=1 `
            -D DNSSD_LIB="$lib_path" `
            -D OPENSSL_ROOT_DIR="$ssl_root" `
            -D CMAKE_INSTALL_PREFIX=input-leap-install

      - name: Build
        shell: powershell
        run: |
          cmake --build build --config Release --target install

      - name: Copy OpenSSL DLLs
        shell: powershell
        run: |
          $openssl_bin = "C:\Program Files (x86)\OpenSSL-Win32\bin"
          Copy-Item "$openssl_bin\libssl-1_1.dll" -Destination "build\input-leap-install" -Force
          Copy-Item "$openssl_bin\libcrypto-1_1.dll" -Destination "build\input-leap-install" -Force

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path build\input-leap-install\* `
            -DestinationPath input-leap-windows-qt5-openssl111-x86.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: input-leap-windows-qt5-openssl111-x86
          path: input-leap-windows-qt5-openssl111-x86.zip
          retention-days: 30
