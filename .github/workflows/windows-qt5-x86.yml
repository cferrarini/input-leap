name: Windows Qt5 Build (OpenSSL 1.1.1 - Windows 7/8 Compatible - x86)

on:
  workflow_dispatch:

env:
  B_BUILD_TYPE: Release

jobs:
 win-build:
    name: Windows Qt5 (x86)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install OpenSSL 1.1.1 (32-bit)
        shell: powershell
        run: |
          choco install openssl --version=1.1.1.2100 -y --forcex86

      # Baixa o instalador oficial da Apple e extrai a DLL de 32 bits real
      - name: Extract Bonjour 32-bit from Apple Official Installer
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Force -ItemType Directory -Path .\deps\bonjour_extracted | Out-Null
          
          # 1. Baixa o instalador oficial estável do Bonjour da Apple
          Write-Host "Baixando Bonjour do servidor da Apple..."
          Invoke-WebRequest 'https://updates.cdn-apple.com/2020/windows/001-29051-20200921-9AB7A720-FC2F-11EA-A3A7-68625902B0F6/Bonjour64.msi' -OutFile 'deps\Bonjour64.msi'
          
          # 2. Extrai o conteúdo do MSI sem instalar no sistema
          Write-Host "Extraindo arquivos do MSI..."
          Start-Process msiexec.exe -ArgumentList "/a `"$pwd\deps\Bonjour64.msi`" /qb TARGETDIR=`"$pwd\deps\bonjour_extracted`"" -Wait
          
          # O MSI de 64 bits da Apple traz AMBAS as DLLs (32 e 64 bits)
          # A versão de 32 bits fica na pasta SystemFolder do dump do MSI
          $dll32 = Get-ChildItem -Path .\deps\bonjour_extracted -Filter "dnssd.dll" -Recurse | Where-Object { $_.FullName -match "SystemFolder" } | Select-Object -First 1
          
          if ($dll32) {
              Write-Host "Sucesso! dnssd.dll de 32 bits encontrada em: $($dll32.FullName)"
              New-Item -Force -ItemType Directory -Path .\deps\lib_target | Out-Null
              Copy-Item $dll32.FullName -Destination ".\deps\lib_target\dnssd.dll" -Force
          } else {
              Write-Error "Não foi possível encontrar a dnssd.dll de 32 bits nos arquivos extraídos!"
          }

      # Cria o arquivo .lib de 32 bits a partir da DLL e injeta o header dns_sd.h local
      - name: Generate dnssd.lib and Inject Header
        shell: cmd
        run: |
          :: 1. Baixa o cabeçalho oficial dns_sd.h direto do repositório da Apple
          powershell -Command "Invoke-WebRequest 'https://raw.githubusercontent.com/apple-oss-distributions/mDNSResponder/main/mDNSShared/dns_sd.h' -OutFile '.\src\gui\src\dns_sd.h'"
          
          :: 2. Configura o ambiente de ferramentas do Visual Studio para x86 (32 bits)
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          
          :: 3. Cria um arquivo .def com as funções exportadas que o InputLeap precisa
          cd deps\lib_target
          (
            echo LIBRARY dnssd.dll
            echo EXPORTS
            echo     DNSServiceRefSockFD
            echo     DNSServiceProcessResult
            echo     DNSServiceRefDeallocate
            echo     DNSServiceBrowse
            echo     DNSServiceRegister
          ) > dnssd.def
          
          :: 4. Usa a ferramenta LIB do VS para gerar o arquivo .lib x86 legítimo
          lib /def:dnssd.def /machine:x86 /out:dnssd.lib
          
          if exist dnssd.lib (
              echo => Sucesso! dnssd.lib de 32 bits gerado com exito.
          ) else (
              exit /b 1
          )

      - name: Install Qt5
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          arch: win32_msvc2019
          cache: true

      - name: Configure build
        shell: powershell
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          New-Item -Force -ItemType Directory -Path build | Out-Null
          
          $ssl_root = "C:\Program Files (x86)\OpenSSL-Win32"
          $lib_path = (Resolve-Path ".\deps\lib_target\dnssd.lib").Path.Replace('\', '/')
          
          cd build
          
          cmake -S .. `
            -G "Visual Studio 17 2022" `
            -A Win32 `
            -D CMAKE_BUILD_TYPE=Release `
            -D QT_DEFAULT_MAJOR_VERSION=5 `
            -D INPUTLEAP_VERSION_DESC=release `
            -D INPUTLEAP_BUILD_GUI=ON `
            -D INPUTLEAP_BUILD_TESTS=OFF `
            -D INPUTLEAP_BUILD_GULRAK_FILESYSTEM=1 `
            -D DNSSD_LIB="$lib_path" `
            -D OPENSSL_ROOT_DIR="$ssl_root" `
            -D CMAKE_INSTALL_PREFIX=input-leap-install

      - name: Build
        shell: powershell
        run: |
          cmake --build build --config Release --target install

      - name: Copy Runtime Dependencies
        shell: powershell
        run: |
          $openssl_bin = "C:\Program Files (x86)\OpenSSL-Win32\bin"
          Copy-Item "$openssl_bin\libssl-1_1.dll" -Destination "build\input-leap-install" -Force
          Copy-Item "$openssl_bin\libcrypto-1_1.dll" -Destination "build\input-leap-install" -Force
          # Copia também a dll do bonjour gerada para acompanhar o executável
          Copy-Item "deps\lib_target\dnssd.dll" -Destination "build\input-leap-install" -Force

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path build\input-leap-install\* `
            -DestinationPath input-leap-windows-qt5-openssl111-x86.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: input-leap-windows-qt5-openssl111-x86
          path: input-leap-windows-qt5-openssl111-x86.zip
          retention-days: 30
