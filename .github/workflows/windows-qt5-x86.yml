name: Windows Qt5 Build (OpenSSL 1.1.1 - Windows 7/8 Compatible - x86)

on:
  workflow_dispatch:

env:
  B_BUILD_TYPE: Release

jobs:
  win-build:
    name: Windows Qt5 (x86)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          path: input-leap
          submodules: recursive

      # CHAVE DE CACHE: Mantém a pasta deps salva para acelerar as execuções
      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: .\deps
          key: ${{ runner.os }}-deps-v2  # Incrementado para invalidar o cache antigo incompleto

      - name: Download Bonjour SDK-like
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Force -ItemType Directory -Path .\deps
          Invoke-WebRequest 'https://github.com/nelsonjchen/mDNSResponder/releases/download/v2019.05.08.1/x64_RelWithDebInfo.zip' -OutFile 'deps\BonjourSDKLike.zip'
          Expand-Archive .\deps\BonjourSDKLike.zip -DestinationPath .\deps\BonjourSDKLike
          Remove-Item deps\BonjourSDKLike.zip

      - name: Download OpenSSL 1.1.1 (Windows 7/8 Compatible - 32-bit)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Force -ItemType Directory -Path .\deps
          
          # Baixando um binário puro x86 (32-bit) do OpenSSL 1.1.1w para evitar conflitos de caminhos híbridos
          Invoke-WebRequest 'https://github.com/curl/curl-for-win/releases/download/openssl-1.1.1w/openssl-1.1.1w-win32-mingw.zip' -OutFile 'deps\Win32OpenSSL.zip'
          Expand-Archive .\deps\Win32OpenSSL.zip -DestinationPath .\deps\Win32OpenSSL
          Remove-Item deps\Win32OpenSSL.zip

      - name: Install Qt5
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          arch: win32_msvc2019
          cache: true

      - name: Configure build
        shell: powershell
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          New-Item -Force -ItemType Directory -Path build | Out-Null
          cd build
          
          $ssl_root = "$env:GITHUB_WORKSPACE\deps\Win32OpenSSL"
          
          # Como este pacote é puramente 32-bit, o include e as libs ficam na raiz/padrão estrutural que o CMake ama
          cmake -S ..\input-leap `
            -G "Visual Studio 17 2022" `
            -A Win32 `
            -D CMAKE_BUILD_TYPE=Release `
            -D QT_DEFAULT_MAJOR_VERSION=5 `
            -D INPUTLEAP_VERSION_DESC=release `
            -D INPUTLEAP_BUILD_GULRAK_FILESYSTEM=1 `
            -D DNSSD_LIB="$env:GITHUB_WORKSPACE\deps\BonjourSDKLike\Lib\Win32\dnssd.lib" `
            -D OPENSSL_ROOT_DIR="$ssl_root" `
            -D CMAKE_INSTALL_PREFIX=input-leap-install

      - name: Build
        shell: powershell
        run: |
          cmake --build build --config Release --target install

      - name: Copy OpenSSL DLLs
        shell: powershell
        run: |
          # Copia as DLLs do novo diretório de 32-bit puro
          $openssl_bin = "$env:GITHUB_WORKSPACE\deps\Win32OpenSSL\bin"
          Copy-Item "$openssl_bin\libssl-1_1.dll" -Destination "build\input-leap-install" -Force
          Copy-Item "$openssl_bin\libcrypto-1_1.dll" -Destination "build\input-leap-install" -Force

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path build\input-leap-install\* `
            -DestinationPath input-leap-windows-qt5-openssl111-x86.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: input-leap-windows-qt5-openssl111-x86
          path: input-leap-windows-qt5-openssl111-x86.zip
          retention-days: 30
