name: Windows Qt5 Build (OpenSSL 1.1.1 - Windows 7/8 Compatible)

on:
  workflow_dispatch:

env:
  B_BUILD_TYPE: Release

jobs:
  win-build:
    name: Windows Qt5 (${{ matrix.arch }})
    runs-on: windows-2022
    strategy:
      matrix:
        include:
          - arch: x64
            generator_arch: x64
            bonjour_lib: x64
          - arch: x86
            generator_arch: Win32
            bonjour_lib: Win32

    steps:
      - uses: actions/checkout@v4
        with:
          path: input-leap
          submodules: recursive

      - name: Download Bonjour SDK-like
        id: bonjour
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Force -ItemType Directory -Path .\deps
          Invoke-WebRequest 'https://github.com/nelsonjchen/mDNSResponder/releases/download/v2019.05.08.1/x64_RelWithDebInfo.zip' -OutFile 'deps\BonjourSDKLike.zip'
          Expand-Archive .\deps\BonjourSDKLike.zip -DestinationPath .\deps\BonjourSDKLike
          Remove-Item deps\BonjourSDKLike.zip
          "path=$env:GITHUB_WORKSPACE\deps\BonjourSDKLike" >> $env:GITHUB_OUTPUT

      - name: Download OpenSSL 1.1.1 (Windows 7/8 Compatible)
        id: openssl
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Force -ItemType Directory -Path .\deps
          
          # Download Win32OpenSSL-1_1_1w (latest 1.1.1 version)
          # This version is compatible with Windows 7, 8, 10, 11
          Invoke-WebRequest 'https://slproweb.com/download/Win32OpenSSL-1_1_1w.zip' -OutFile 'deps\Win32OpenSSL.zip'
          Expand-Archive .\deps\Win32OpenSSL.zip -DestinationPath .\deps\Win32OpenSSL
          Remove-Item deps\Win32OpenSSL.zip
          
          "path=$env:GITHUB_WORKSPACE\deps\Win32OpenSSL" >> $env:GITHUB_OUTPUT

      - name: Install Qt5
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          arch: ${{ matrix.arch }}
          cache: true

      - name: Configure build
        shell: powershell
        run: |
          New-Item -Force -ItemType Directory -Path build-${{ matrix.arch }} | Out-Null
          cd build-${{ matrix.arch }}
          
          cmake -S ..\input-leap `
            -G "Visual Studio 17 2022" `
            -A ${{ matrix.generator_arch }} `
            -D CMAKE_BUILD_TYPE=Release `
            -D QT_DEFAULT_MAJOR_VERSION=5 `
            -D INPUTLEAP_VERSION_DESC=release `
            -D INPUTLEAP_BUILD_GULRAK_FILESYSTEM=1 `
            -D DNSSD_LIB="$env:BONJOUR_SDK_HOME\Lib\${{ matrix.bonjour_lib }}\dnssd.lib" `
            -D OPENSSL_ROOT_DIR="$env:OPENSSL_ROOT_DIR" `
            -D OPENSSL_CRYPTO_LIBRARY="$env:OPENSSL_ROOT_DIR\lib\libcrypto.lib" `
            -D OPENSSL_SSL_LIBRARY="$env:OPENSSL_ROOT_DIR\lib\libssl.lib" `
            -D CMAKE_INSTALL_PREFIX=input-leap-install
        env:
          BONJOUR_SDK_HOME: ${{ steps.bonjour.outputs.path }}
          OPENSSL_ROOT_DIR: ${{ steps.openssl.outputs.path }}

      - name: Build
        shell: powershell
        run: |
          cmake --build build-${{ matrix.arch }} --config Release --target install

      - name: Copy OpenSSL DLLs
        shell: powershell
        run: |
          $openssl_path = "$env:GITHUB_WORKSPACE\deps\Win32OpenSSL"
          Copy-Item "$openssl_path\bin\libssl-1_1.dll" -Destination "build-${{ matrix.arch }}\input-leap-install" -Force
          Copy-Item "$openssl_path\bin\libcrypto-1_1.dll" -Destination "build-${{ matrix.arch }}\input-leap-install" -Force

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path build-${{ matrix.arch }}\input-leap-install\* `
            -DestinationPath input-leap-windows-qt5-openssl111-${{ matrix.arch }}.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: input-leap-windows-qt5-openssl111-${{ matrix.arch }}
          path: input-leap-windows-qt5-openssl111-${{ matrix.arch }}.zip
          retention-days: 30
